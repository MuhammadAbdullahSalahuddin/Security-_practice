# FIXED
services:
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  api:
    environment:
      - MONGO_URI=mongodb://mongo:27017/
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mongo_data:
